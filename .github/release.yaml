changelog:
  exclude:
    labels:
      - ignore-for-release
  categories:
    - title: Features
      labels:
        - feature
    - title: Fixes
      labels:
        - fix
    - title: Chores
      labels:
        - chore
    - title: Dependencies
      labels:
        - dependencies
    - title: Other changes
      labels:
        - "*"
